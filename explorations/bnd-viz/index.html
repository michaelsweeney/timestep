<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EnergyPlus BND system visualizer (trial)</title>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script src="parsebnd.js"></script>
<script src="buildgraph.js"></script>
<script src="layoutbnd.js"></script>
<!-- generated by collect-samples.mjs; optional (gitignored, machine-local) -->
<script src="samples.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.45 system-ui, sans-serif; display: flex; height: 100vh; }
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #toolbar { padding: 8px 12px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  #toolbar select { max-width: 320px; }
  #cy { flex: 1; }
  #drop { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; font-size: 16px; border: 3px dashed #ccc; margin: 16px; border-radius: 12px; }
  #drop.active { border-color: #4a90d9; color: #4a90d9; }
  #panel { width: 360px; border-left: 1px solid #ddd; padding: 14px; overflow-y: auto; background: #fafafa; }
  #panel h2 { margin: 0 0 2px; font-size: 15px; word-break: break-word; }
  #panel .type { color: #777; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
  #panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: #555; margin: 14px 0 4px; }
  #panel table { border-collapse: collapse; width: 100%; font-size: 12px; }
  #panel td { padding: 2px 6px 2px 0; vertical-align: top; word-break: break-word; }
  #panel td:first-child { color: #888; white-space: nowrap; }
  #panel .conn { padding: 5px 7px; background: #fff; border: 1px solid #e3e3e3; border-radius: 5px; margin-bottom: 5px; font-size: 12px; word-break: break-word; }
  #panel .conn .ct { font-weight: 600; }
  #panel .conn .obj { color: #555; }
  #panel .suspicious { color: #b00; font-weight: 600; }
  #panel .empty { color: #999; font-style: italic; }
  .hint { color: #999; font-size: 12px; }
</style>
</head>
<body>
<div id="main">
  <div id="toolbar">
    <label>Sample:
      <select id="samplePicker"><option value="">— pick one —</option></select>
    </label>
    <strong id="filename"></strong>
    <label>Loop:
      <select id="loopFilter"><option value="">all</option></select>
    </label>
    <label>Layout:
      <select id="layoutMode">
        <option value="system">system flow</option>
        <option value="organic">organic</option>
      </select>
    </label>
    <label><input type="checkbox" id="showZones" checked> zones</label>
    <button id="fit">fit</button>
    <span class="hint">click a component or edge to drill down · drop another .bnd to replace</span>
  </div>
  <div id="drop">pick a sample above, or drop an EnergyPlus <b>&nbsp;.bnd&nbsp;</b> file here</div>
  <div id="cy" style="display:none"></div>
</div>
<div id="panel">
  <span class="empty">Nothing selected.</span>
</div>

<script>
cytoscape.use(cytoscapeFcose);

let cy = null;
let model = null;
let graph = null;

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function loadText(name, text) {
  model = parseBnd(text);
  graph = buildGraph(model);
  // remember each node's compound parent so layout modes can flatten/restore
  for (const el of graph.elements)
    if (!el.data.source) el.data.origParent = el.data.parent || null;
  $('filename').textContent = name;
  if (graph.elements.length === 0) {
    $('cy').style.display = 'none';
    $('drop').style.display = 'flex';
    $('drop').textContent = `${name}: no HVAC topology in this .bnd (model has no air or plant loops).`;
    if (cy) { cy.destroy(); cy = null; }
    clearPanel();
    return;
  }
  $('drop').style.display = 'none';
  $('cy').style.display = 'block';

  const loops = [...new Set(
    graph.elements.filter(e => e.data.isGroup && e.data.id.startsWith('loop|')).map(e => e.data.label)
  )].sort();
  $('loopFilter').innerHTML = '<option value="">all</option>' +
    loops.map(l => `<option>${esc(l)}</option>`).join('');

  if (cy) cy.destroy();
  cy = cytoscape({
    container: $('cy'),
    elements: graph.elements,
    wheelSensitivity: 0.2,
    style: [
      { selector: 'node', style: {
          label: 'data(label)', 'font-size': 9, width: 26, height: 26,
          'text-valign': 'bottom', 'text-margin-y': 3, 'text-wrap': 'wrap', 'text-max-width': 110,
          'background-color': '#7aa6d6', 'border-width': 1, 'border-color': '#476a92'
      }},
      { selector: 'node[?isZone]', style: { shape: 'round-rectangle', 'background-color': '#e8b04b', 'border-color': '#a87c25', width: 34, height: 24 } },
      { selector: 'node[type^="CONNECTOR"], node[type^="AIRLOOPHVAC:ZONE"]', style: { shape: 'diamond', 'background-color': '#9b8ec4', 'border-color': '#6a5f93' } },
      { selector: ':parent', style: {
          'background-opacity': 0.06, 'border-color': '#bbb', 'border-width': 1,
          label: 'data(label)', 'font-size': 11, 'font-weight': 'bold',
          'text-valign': 'top', 'text-margin-y': -4, color: '#666'
      }},
      { selector: 'edge', style: {
          width: 1.4, 'line-color': '#999', 'target-arrow-color': '#999',
          'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.8,
          opacity: 0.65
      }},
      { selector: 'edge[fluid="Air"]', style: { 'line-color': '#8aa68a', 'target-arrow-color': '#8aa68a' } },
      { selector: 'edge[fluid="Water"]', style: { 'line-color': '#5b8bc9', 'target-arrow-color': '#5b8bc9' } },
      { selector: 'edge[kind="crossover"]', style: { 'line-style': 'dashed', 'line-color': '#c77', 'target-arrow-color': '#c77' } },
      { selector: '.faded', style: { opacity: 0.12, 'text-opacity': 0.12 } },
      { selector: ':selected', style: { 'border-width': 3, 'border-color': '#d33', 'line-color': '#d33', 'target-arrow-color': '#d33' } }
    ],
    layout: { name: 'preset' } // applyLayout() runs immediately after
  });

  cy.on('tap', 'node', e => showVertex(e.target));
  cy.on('tap', 'edge', e => showEdge(e.target));
  cy.on('tap', e => { if (e.target === cy) clearPanel(); });
  applyLayout();
}

// "system flow": deterministic rule-based schematic (waterside → airside →
// distribution → zones → return, left to right; one band per system) with
// orthogonal polyline edges. "organic": fcose force layout, bezier edges.
function applyLayout() {
  if (!cy) return;
  if ($('layoutMode').value === 'system') {
    // bands/columns already encode the grouping, so compounds are
    // redundant boxes that span bands — flatten them for this mode
    const sys = computeSystemLayout(model, graph);
    cy.batch(() => {
      cy.nodes(':child').move({ parent: null });
      cy.nodes('[?isGroup], [?isContainer]').style('display', 'none');
    });
    cy.style()
      .selector('edge').style({ 'curve-style': 'taxi', 'taxi-direction': 'rightward',
                                'taxi-turn': 40, 'taxi-turn-min-distance': 12 })
      .update();
    cy.layout({ name: 'preset', positions: n => sys.positions[n.id()] || undefined,
                animate: false, fit: true, padding: 30 }).run();
  } else {
    cy.batch(() => {
      cy.nodes('[?isGroup], [?isContainer]').style('display', 'element');
      cy.nodes().forEach(n => {
        const p = n.data('origParent');
        if (p && n.data('parent') !== p) n.move({ parent: p });
      });
    });
    cy.style().selector('edge').style({ 'curve-style': 'bezier' }).update();
    cy.layout({ name: 'fcose', quality: 'proof', animate: false, nodeSeparation: 90,
                idealEdgeLength: 70, nestingFactor: 0.7, packComponents: true }).run();
  }
}

function applyFilter() {
  const loop = $('loopFilter').value;
  const zones = $('showZones').checked;
  cy.elements().removeClass('faded');
  let visible = cy.elements();
  if (loop) {
    const group = cy.getElementById('loop|' + loop);
    const inLoop = group.union(group.descendants());
    // keep zones + anything directly wired to the loop's components
    const wired = inLoop.connectedEdges().connectedNodes().union(inLoop.connectedEdges());
    visible = inLoop.union(wired).union(wired.ancestors());
  }
  if (!zones) visible = visible.difference(cy.nodes('[?isZone]'));
  cy.elements().difference(visible.union(visible.connectedEdges().filter(e =>
    visible.contains(e.source()) && visible.contains(e.target())
  ))).addClass('faded');
}

function nodeInfoRow(name) {
  const info = model.nodes[name];
  if (!info) return esc(name);
  return `${esc(name)} <span style="color:#888">(${esc(info.fluidType)}` +
    (info.suspicious ? ', <span class="suspicious">suspicious</span>' : '') + ')</span>';
}

function connectionsHtml(nodeNames) {
  const out = [];
  for (const n of nodeNames) {
    for (const c of graph.connectionsByNode[n] || []) {
      out.push(`<div class="conn"><span class="ct">${esc(c.connectionType)}</span> @ ${esc(n)}<br>` +
        `<span class="obj">${esc(c.objectType)} — ${esc(c.objectName)}</span></div>`);
    }
  }
  return out.length ? out.join('') : '<span class="empty">none</span>';
}

function showVertex(n) {
  const d = n.data();
  if (d.isGroup) { clearPanel(); return; }
  const v = graph.vertices[d.id];
  if (!v) { clearPanel(); return; }
  const nodeNames = [...new Set(v.pairs.flatMap(p => [p.inlet, p.outlet]).filter(Boolean))];
  if (v.zoneNode) nodeNames.push(v.zoneNode);
  let html = `<h2>${esc(v.name)}</h2><div class="type">${esc(v.type)}</div><table>`;
  if (v.branch) html += `<tr><td>branch</td><td>${esc(v.branch)}</td></tr>`;
  if (v.group) html += `<tr><td>group</td><td>${esc(v.group.replace('loop|', ''))}</td></tr>`;
  if (v.zone) html += `<tr><td>zone</td><td>${esc(v.zone)}</td></tr>`;
  html += '</table><h3>Node pairs</h3><table>';
  for (const p of v.pairs) {
    html += `<tr><td>in</td><td>${p.inlet ? nodeInfoRow(p.inlet) : '—'}</td></tr>` +
            `<tr><td>out</td><td>${p.outlet ? nodeInfoRow(p.outlet) : '—'}</td></tr>`;
  }
  html += '</table><h3>Objects touching these nodes</h3>' + connectionsHtml(nodeNames);
  $('panel').innerHTML = html;
}

function showEdge(e) {
  const d = e.data();
  const names = d.label.split(' ⇒ ');
  let html = `<h2>${names.map(esc).join('<br>⇓<br>')}</h2>` +
    `<div class="type">${d.kind === 'crossover' ? 'implicit loop interface' : 'fluid node'}</div>`;
  html += `<table><tr><td>from</td><td>${esc(d.source.split('|')[1])}</td></tr>` +
          `<tr><td>to</td><td>${esc(d.target.split('|')[1])}</td></tr></table>`;
  html += '<h3>Objects touching this node</h3>' + connectionsHtml(names);
  $('panel').innerHTML = html;
}

function clearPanel() {
  $('panel').innerHTML = '<span class="empty">Nothing selected.</span>';
}

// drag-drop wiring (whole window, so it also works after first load)
window.addEventListener('dragover', e => { e.preventDefault(); $('drop').classList.add('active'); });
window.addEventListener('dragleave', () => $('drop').classList.remove('active'));
window.addEventListener('drop', e => {
  e.preventDefault();
  $('drop').classList.remove('active');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  f.text().then(t => loadText(f.name, t));
});
$('loopFilter').addEventListener('change', applyFilter);
$('showZones').addEventListener('change', applyFilter);
$('layoutMode').addEventListener('change', applyLayout);
$('fit').addEventListener('click', () => cy && cy.fit(undefined, 30));

// pre-seeded samples (samples.js, generated by collect-samples.mjs)
if (window.BND_SAMPLES && window.BND_SAMPLES.length) {
  $('samplePicker').innerHTML = '<option value="">— pick one —</option>' +
    window.BND_SAMPLES.map((s, i) => `<option value="${i}">${esc(s.name)}</option>`).join('');
  $('samplePicker').addEventListener('change', e => {
    const s = window.BND_SAMPLES[e.target.value];
    if (s) loadText(s.name, s.text);
  });
  // #sample=N auto-loads on open (shareable / scriptable)
  const hash = location.hash.match(/sample=(\d+)/);
  if (hash && window.BND_SAMPLES[hash[1]]) {
    $('samplePicker').value = hash[1];
    const s = window.BND_SAMPLES[hash[1]];
    loadText(s.name, s.text);
  }
} else {
  $('samplePicker').parentElement.style.display = 'none';
}
</script>
</body>
</html>
