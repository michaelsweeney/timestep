<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>timestep · focused single-chart workspace</title>
<!--
  MOCK-UP 3 of 3 — "Focused single deep chart"
  The inverse of mock-up 2: one large primary chart that fills the workspace,
  with everything else in service of it — a thin variable rail, an inline
  chart-type switcher, a context/overview strip below the main chart for
  range-brushing (linked to the main view), a live inspector, and the gear
  popover. For the "I'm studying ONE thing deeply" mode. Static, no real data.
-->
<style>
  :root {
    --bg: #1a1a1d; --panel: #222226; --panel-2: #28282d; --panel-3: #2f2f35;
    --hairline: #353539; --hairline-2: #45454d;
    --ink: #eceef2; --ink-dim: #9698a2; --ink-faint: #61626c;
    --indigo: #8c9eff; --indigo-dim: #5a64a8; --pink: #ff5c8d; --axis: #cfcfcf;
    --sel: rgba(140,158,255,.16);
    --mono: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }
  body.light {
    --bg: #f1f2f5; --panel: #fff; --panel-2: #fff; --panel-3: #f5f6f8;
    --hairline: #e2e4e8; --hairline-2: #ccd0d7;
    --ink: #1a1c20; --ink-dim: #5a5f6b; --ink-faint: #99a0ac;
    --indigo: #3f51b5; --indigo-dim: #9aa3d8; --pink: #f50057; --axis: rgba(0,0,0,.7);
    --sel: rgba(63,81,181,.1);
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--ink); font: 14px/1.45 var(--sans);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #topbar { flex: none; height: 50px; display: flex; align-items: center; gap: 16px;
    padding: 0 16px; border-bottom: 1px solid var(--hairline); background: var(--panel-2); }
  .wordmark { font: 700 19px/1 var(--sans); }
  .wordmark .a { color: var(--indigo); } .wordmark .b { color: var(--pink); }
  .chip { font: 500 12px var(--mono); color: var(--ink-dim); border: 1px solid var(--hairline-2); border-radius: 5px; padding: 6px 9px; background: var(--panel-3); }
  #spacer { flex: 1; }
  /* inline chart-type switcher in the topbar — the focus is the chart */
  .ctswitch { display: inline-flex; border: 1px solid var(--hairline-2); border-radius: 7px; overflow: hidden; }
  .ctswitch button { appearance: none; border: 0; background: transparent; color: var(--ink-dim); font: 600 12px var(--sans); letter-spacing: .04em; padding: 8px 13px; cursor: pointer; display: inline-flex; gap: 6px; align-items: center; transition: .15s; }
  .ctswitch button + button { border-left: 1px solid var(--hairline-2); }
  .ctswitch button.on { background: var(--sel); color: var(--indigo); }
  .ctswitch button:hover:not(.on) { color: var(--ink); }
  .gear { appearance: none; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--hairline-2); background: var(--panel-3); color: var(--ink-dim); font-size: 16px; cursor: pointer; }
  .gear:hover { color: var(--ink); border-color: var(--indigo); }
  .pop { position: absolute; top: 54px; right: 14px; width: 248px; z-index: 40; background: var(--panel-2);
    border: 1px solid var(--hairline-2); border-radius: 10px; box-shadow: 0 18px 44px rgba(0,0,0,.55); padding: 8px; display: none; }
  .pop.open { display: block; }
  .pop h4 { margin: 8px 8px 4px; font: 600 10px/1 var(--sans); letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); }
  .poprow { display: flex; align-items: center; justify-content: space-between; padding: 8px; }
  .seg { display: inline-flex; border: 1px solid var(--hairline-2); border-radius: 6px; overflow: hidden; }
  .seg button { appearance: none; border: 0; background: transparent; color: var(--ink-dim); font: 500 12px var(--mono); padding: 5px 11px; cursor: pointer; }
  .seg button.on { background: var(--indigo); color: var(--bg); }
  .sel-in { appearance: none; background: var(--panel-3); color: var(--ink); border: 1px solid var(--hairline-2); border-radius: 6px; font: 500 12px var(--sans); padding: 6px 9px; }

  #work { flex: 1; display: flex; min-height: 0; }

  /* thin variable rail — chips, not a full tree, to keep focus on the chart */
  #rail { width: 220px; flex: none; background: var(--panel-2); border-right: 1px solid var(--hairline); display: flex; flex-direction: column; }
  .rhead { flex: none; height: 36px; display: flex; align-items: center; padding: 0 14px; border-bottom: 1px solid var(--hairline); }
  .rhead .t { font: 600 11px/1 var(--sans); letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); }
  .rsearch { padding: 10px; }
  .rsearch input { width: 100%; appearance: none; background: var(--panel-3); border: 1px solid var(--hairline-2); border-radius: 7px; color: var(--ink); font: 400 13px var(--sans); padding: 8px 10px; }
  .rsearch input:focus { outline: none; border-color: var(--indigo); }
  .rlist { flex: 1; overflow-y: auto; padding: 2px 8px 14px; }
  .rgrp { font: 600 10px var(--sans); letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); padding: 12px 6px 5px; }
  .rvar { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px; cursor: pointer; color: var(--ink-dim); font: 400 12.5px var(--sans); }
  .rvar:hover { background: rgba(255,255,255,.04); color: var(--ink); }
  body.light .rvar:hover { background: rgba(0,0,0,.04); }
  .rvar.on { background: var(--sel); color: var(--indigo); font-weight: 500; }
  .rvar .sw { width: 9px; height: 9px; border-radius: 2px; flex: none; }

  /* main column: big chart + context strip */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--panel); }
  .mainhead { flex: none; height: 44px; display: flex; align-items: center; gap: 12px; padding: 0 18px; border-bottom: 1px solid var(--hairline); }
  .mainhead h1 { margin: 0; font: 600 16px/1 var(--mono); color: var(--ink); }
  .mainhead .units { font: 500 12px var(--mono); color: var(--ink-faint); }
  .mainhead .right { margin-left: auto; display: flex; gap: 8px; }
  .smbtn { appearance: none; background: transparent; border: 1px solid var(--hairline-2); color: var(--ink-dim); border-radius: 6px; font: 500 12px var(--sans); padding: 6px 11px; cursor: pointer; }
  .smbtn:hover { color: var(--ink); border-color: var(--indigo); }
  .mainbody { flex: 1; min-height: 0; position: relative; padding: 16px 18px 6px; }
  .mainbody svg { width: 100%; height: 100%; display: block; }
  .interval-tabs { display: inline-flex; gap: 2px; }
  .interval-tabs button { appearance: none; background: transparent; border: 0; color: var(--ink-faint); font: 500 12px var(--mono); padding: 5px 9px; border-radius: 5px; cursor: pointer; }
  .interval-tabs button.on { background: var(--sel); color: var(--indigo); }

  /* context / overview strip with a brush — linked to main chart */
  .context { flex: none; height: 76px; padding: 6px 18px 12px; border-top: 1px solid var(--hairline); background: var(--panel-2); position: relative; }
  .context .clabel { position: absolute; top: 8px; left: 18px; font: 600 9.5px var(--sans); letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); }
  .context svg { width: 100%; height: 100%; display: block; }
  .brush { fill: var(--indigo); opacity: .14; stroke: var(--indigo); stroke-width: 1; cursor: move; }
  .brushhandle { fill: var(--indigo); cursor: ew-resize; }

  .gl { stroke: var(--hairline); } .al { stroke: var(--axis); opacity: .5; } .lbl { fill: var(--ink-faint); font: 400 10px var(--mono); }

  /* inspector */
  #inspector { width: 290px; flex: none; background: var(--panel-2); border-left: 1px solid var(--hairline); display: flex; flex-direction: column; }
  .ih { flex: none; height: 36px; display: flex; align-items: center; padding: 0 14px; border-bottom: 1px solid var(--hairline); }
  .ih .t { font: 600 11px var(--sans); letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); }
  .ibody { flex: 1; overflow-y: auto; padding: 16px; }
  .ibody h2 { margin: 0 0 6px; font: 600 15px/1.3 var(--mono); color: var(--ink); }
  .kind { display: inline-block; font: 600 10px var(--mono); letter-spacing: .14em; color: var(--indigo); border: 1px solid var(--indigo-dim); border-radius: 4px; padding: 3px 7px; margin-bottom: 14px; }
  .isec { font: 600 10px var(--sans); letter-spacing: .16em; text-transform: uppercase; color: var(--ink-faint); margin: 16px 0 6px; border-bottom: 1px solid var(--hairline); padding-bottom: 5px; }
  .ibody table { width: 100%; border-collapse: collapse; font: 400 12.5px/1.6 var(--mono); }
  .ibody td { padding: 2px 6px 2px 0; } .ibody td:first-child { color: var(--ink-dim); } .ibody td:last-child { color: var(--ink); text-align: right; }
  .hl { color: var(--pink) !important; font-weight: 600; }
  .legend { display: flex; flex-direction: column; gap: 6px; }
  .legrow { display: flex; align-items: center; gap: 8px; font: 400 12px var(--mono); color: var(--ink-dim); }
  .legrow .sw { width: 11px; height: 3px; border-radius: 2px; }

  #foot { flex: none; height: 24px; display: flex; align-items: center; padding: 0 14px; border-top: 1px solid var(--hairline); background: var(--panel); font: 400 11px var(--mono); color: var(--ink-faint); }
</style>
</head>
<body>
  <div id="topbar">
    <span class="wordmark"><span class="a">time</span><span class="b">step</span></span>
    <span class="chip">⊞ large_office_vav.sql</span>
    <div id="spacer"></div>
    <div class="ctswitch">
      <button onclick="ct(this,'hm')">▦ Heatmap</button>
      <button class="on" onclick="ct(this,'ml')">∿ Multiline</button>
      <button onclick="ct(this,'sc')">⁘ Scatter</button>
      <button onclick="ct(this,'hg')">▁▃▅ Histogram</button>
    </div>
    <button class="gear" onclick="document.getElementById('pop').classList.toggle('open')">⚙</button>
  </div>
  <div class="pop" id="pop">
    <h4>Theme</h4>
    <div class="poprow"><span>Appearance</span><div class="seg"><button class="on" onclick="setTheme('dark',this)">Dark</button><button onclick="setTheme('light',this)">Light</button></div></div>
    <h4>Units</h4>
    <div class="poprow"><span>System</span><div class="seg"><button onclick="seg(this)">SI</button><button class="on" onclick="seg(this)">IP</button></div></div>
    <h4>Colorscale</h4>
    <div class="poprow"><span>Ramp</span><select class="sel-in"><option>Viridis</option><option>RdYlBu</option><option>Turbo</option></select></div>
  </div>

  <div id="work">
    <aside id="rail">
      <div class="rhead"><span class="t">Series</span></div>
      <div class="rsearch"><input placeholder="/ search…" /></div>
      <div class="rlist" id="rlist"></div>
    </aside>

    <div id="main">
      <div class="mainhead">
        <h1 id="mtitle">Zone 1 Air Temperature</h1>
        <span class="units" id="munits">°F · hourly</span>
        <div class="right">
          <div class="interval-tabs">
            <button onclick="iv(this)">Timestep</button><button class="on" onclick="iv(this)">Hourly</button><button onclick="iv(this)">Daily</button><button onclick="iv(this)">Monthly</button>
          </div>
          <button class="smbtn">⤓ Export</button>
        </div>
      </div>
      <div class="mainbody"><svg id="bigchart" viewBox="0 0 900 360" preserveAspectRatio="none"></svg></div>
      <div class="context">
        <span class="clabel">Full year · drag to window the chart above</span>
        <svg id="ctxchart" viewBox="0 0 900 64" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <aside id="inspector">
      <div class="ih"><span class="t">Inspector</span></div>
      <div class="ibody" id="ibody"></div>
    </aside>
  </div>

  <div id="foot"><span>1 file · 8760 hourly · windowed: Jun 01 – Jul 15</span>
    <span style="margin-left:auto">single-chart focus concept · context strip linked to main view</span></div>

<script>
function css(v){ return getComputedStyle(document.body).getPropertyValue(v).trim(); }
function setTheme(t,el){ document.body.classList.toggle('light',t==='light');
  el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); drawAll(); }
function seg(el){ el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
function iv(el){ el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); drawAll(); }
let curType='ml';
function ct(el,t){ el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); curType=t; drawAll(); }

// variable rail
const groups={ 'Zones':['Zone 1 Air Temp','Zone 2 Air Temp','Zone 3 Air Temp','Zone 4 Air Temp'], 'Facility':['Facility Electricity','Cooling Coil Load','Fan Electricity'] };
const sws=['var(--indigo)','var(--pink)','#5ec8c0','#ffb84d','#b48cff','#6fd08f','#ff9966'];
function buildRail(){ const el=document.getElementById('rlist'); let h='',i=0;
  for(const g in groups){ h+=`<div class="rgrp">${g}</div>`;
    for(const v of groups[g]){ const on=i===0; h+=`<div class="rvar ${on?'on':''}" onclick="pick(this,'${v}')"><span class="sw" style="background:${sws[i%sws.length]}"></span>${v}</div>`; i++; } }
  el.innerHTML=h; }
function pick(elm,name){ document.querySelectorAll('.rvar').forEach(b=>b.classList.remove('on')); elm.classList.add('on');
  document.getElementById('mtitle').textContent=name; setInspector(name); drawAll(); }

function setInspector(name){ document.getElementById('ibody').innerHTML=`
  <h2>${name}</h2><span class="kind">SERIES · HOURLY · °F</span>
  <div class="isec">Windowed stats (Jun 1 – Jul 15)</div>
  <table><tr><td>Min</td><td>64.1 °F</td></tr><tr><td>Mean</td><td>74.3 °F</td></tr><tr><td>Max</td><td>81.4 °F</td></tr>
    <tr><td>Peak at</td><td>Jul 11 · 15:00</td></tr><tr><td>At cursor</td><td class="hl">78.2 °F</td></tr></table>
  <div class="isec">Annual stats</div>
  <table><tr><td>Min</td><td>58.2 °F</td></tr><tr><td>Mean</td><td>72.6 °F</td></tr><tr><td>Max</td><td>81.4 °F</td></tr></table>
  <div class="isec">Series on chart</div>
  <div class="legend">
    <div class="legrow"><span class="sw" style="background:var(--indigo)"></span>${name}</div>
    <div class="legrow"><span class="sw" style="background:var(--pink)"></span>Outdoor Dry-Bulb</div>
  </div>`; }

// window selection (fraction of the year shown in the main chart)
let win=[0.42,0.54];

function ramp(t){ const s=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];
  const i=Math.min(s.length-2,Math.floor(t*(s.length-1))),f=t*(s.length-1)-i,a=s[i],b=s[i+1];
  return `rgb(${a.map((c,k)=>Math.round(c+(b[k]-c)*f)).join(',')})`; }

function drawBig(){ const el=document.getElementById('bigchart'); const grid=css('--hairline'),ax=css('--axis'),ind=css('--indigo'),pink=css('--pink'),ink=css('--ink-faint');
  const ml=46,mt=14,W=900-ml-20,H=360-mt-30; let h='';
  for(let g=0;g<=4;g++){ const y=mt+H*g/4; h+=`<line class="gl" x1="${ml}" y1="${y}" x2="${ml+W}" y2="${y}" stroke="${grid}"/>`;
    h+=`<text class="lbl" x="10" y="${y+3}" fill="${ink}">${(82-g*7).toFixed(0)}</text>`; }
  if(curType==='ml'){ let p1='',p2='';
    for(let i=0;i<=300;i++){ const f=win[0]+(win[1]-win[0])*i/300; const x=ml+i/300*W;
      const y1=mt+H*(0.5-0.42*Math.sin(f*60)+0.03*Math.sin(f*400));
      const y2=mt+H*(0.6-0.3*Math.sin(f*60+0.6));
      p1+=(i?'L':'M')+x.toFixed(1)+' '+y1.toFixed(1); p2+=(i?'L':'M')+x.toFixed(1)+' '+y2.toFixed(1); }
    h+=`<path d="${p2}" fill="none" stroke="${pink}" stroke-width="1.3" opacity=".7"/><path d="${p1}" fill="none" stroke="${ind}" stroke-width="2"/>`;
    const cx=ml+W*0.58, cy=mt+H*(0.5-0.42*Math.sin((win[0]+(win[1]-win[0])*0.58)*60));
    h+=`<line x1="${cx}" y1="${mt}" x2="${cx}" y2="${mt+H}" stroke="${pink}" stroke-width="1.5" stroke-dasharray="3 2" opacity=".85"/><circle cx="${cx}" cy="${cy}" r="4" fill="${ind}" stroke="${ax}"/>`;
  } else if(curType==='hm'){ const cw=W/48,ch=H/14;
    for(let d=0;d<14;d++)for(let hh=0;hh<48;hh++){ const v=(Math.sin(hh/48*6.28-1.3)*.5+.5)*.7+Math.sin(d/14*3.14)*.3;
      h+=`<rect x="${ml+hh*cw}" y="${mt+d*ch}" width="${cw-.5}" height="${ch-.5}" fill="${ramp(Math.max(0,Math.min(1,v)))}"/>`; }
  } else if(curType==='sc'){ h+=`<line class="al" x1="${ml}" y1="${mt+H}" x2="${ml+W}" y2="${mt+H}" stroke="${ax}"/>`;
    for(let i=0;i<420;i++){ const t=Math.random(),x=ml+t*W,y=mt+H*(1-(t*.6+Math.random()*.35)); h+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.6" fill="${ramp(t)}" opacity=".8"/>`; }
  } else { const nb=28,bw=W/nb;
    for(let i=0;i<nb;i++){ const v=Math.exp(-Math.pow((i-nb*0.55)/(nb*0.22),2)); const bh=H*v;
      h+=`<rect x="${ml+i*bw+1}" y="${mt+H-bh}" width="${bw-2}" height="${bh}" fill="${ind}" opacity=".85"/>`; } }
  h+=`<line class="al" x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+H}" stroke="${ax}"/><line class="al" x1="${ml}" y1="${mt+H}" x2="${ml+W}" y2="${mt+H}" stroke="${ax}"/>`;
  el.innerHTML=h; }

function drawCtx(){ const el=document.getElementById('ctxchart'); const ind=css('--indigo'),grid=css('--hairline');
  const W=900,H=64; let p='';
  for(let i=0;i<=400;i++){ const x=i/400*W; const y=H*(0.5-0.4*Math.sin(i/400*60)*0.4 - 0.25*Math.sin(i/400*6.28)); p+=(i?'L':'M')+x.toFixed(1)+' '+(8+y*0.7).toFixed(1); }
  let h=`<path d="${p}" fill="none" stroke="${css('--ink-faint')}" stroke-width="1" opacity=".6"/>`;
  const bx=win[0]*W, bw=(win[1]-win[0])*W;
  h+=`<rect class="brush" x="${bx}" y="2" width="${bw}" height="${H-4}"/>`;
  h+=`<rect class="brushhandle" id="hL" x="${bx-2}" y="2" width="4" height="${H-4}"/><rect class="brushhandle" id="hR" x="${bx+bw-2}" y="2" width="4" height="${H-4}"/>`;
  el.innerHTML=h; attachBrush(); }

function attachBrush(){ const svg=document.getElementById('ctxchart');
  function frac(ev){ const r=svg.getBoundingClientRect(); return Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width)); }
  svg.querySelector('.brush').addEventListener('mousedown',e=>{ e.preventDefault(); const start=frac(e),w0=[...win];
    function mv(ev){ const d=frac(ev)-start; let a=w0[0]+d,b=w0[1]+d; if(a<0){b-=a;a=0;} if(b>1){a-=(b-1);b=1;} win=[a,b]; drawCtx(); drawBig(); }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); });
  svg.querySelector('#hL').addEventListener('mousedown',e=>{ e.preventDefault();
    function mv(ev){ win[0]=Math.min(win[1]-0.02,frac(ev)); drawCtx(); drawBig(); }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); });
  svg.querySelector('#hR').addEventListener('mousedown',e=>{ e.preventDefault();
    function mv(ev){ win[1]=Math.max(win[0]+0.02,frac(ev)); drawCtx(); drawBig(); }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); }); }

function drawAll(){ drawBig(); drawCtx(); }
buildRail(); setInspector('Zone 1 Air Temp'); drawAll();
window.addEventListener('resize',drawAll);
</script>
</body>
</html>
