name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install @timestep/core dependencies
        run: yarn --cwd packages/core install --frozen-lockfile

      - name: Lint (informational — ESLint stack not yet modernized)
        run: yarn lint
        continue-on-error: true

      - name: Type-check (informational — ~213 errors, Phase 1 follow-up)
        run: yarn ts
        continue-on-error: true

      - name: Build (main + renderer)
        run: yarn build

      - name: Test (@timestep/core — vitest)
        run: yarn --cwd packages/core test

      - name: Test (app — jest, informational — suite is stale ERB boilerplate)
        run: yarn test
        continue-on-error: true
